<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carousel AI</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root {
  --bg: #0e0e0e; --surface: #161616; --surface2: #1e1e1e; --surface3: #252525;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
  --text: #f0ede8; --muted: #666; --accent: #d4f55c; --blue: #4a7fd4;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-weight: 300; min-height: 100vh; display: flex; flex-direction: column; }

/* HEADER */
.header { padding: 16px 28px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.logo { font-family: 'Unbounded', sans-serif; font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.logo-dot { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.nav { display: flex; gap: 4px; }
.nav-btn { padding: 6px 14px; font-size: 12px; border: 0.5px solid transparent; border-radius: 6px; cursor: pointer; background: transparent; color: var(--muted); font-family: 'Inter', sans-serif; transition: all .15s; }
.nav-btn:hover { color: var(--text); }
.nav-btn.active { background: var(--surface2); border-color: var(--border2); color: var(--text); }

/* LAYOUT */
.app { display: grid; grid-template-columns: 400px 1fr; flex: 1; min-height: 0; }

/* LEFT PANEL */
.left { border-right: 0.5px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }
.left-section { padding: 20px 24px; border-bottom: 0.5px solid var(--border); }
.section-label { font-size: 10px; font-weight: 500; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }

textarea {
  width: 100%; height: 160px; background: var(--surface2); border: 0.5px solid var(--border2);
  border-radius: 8px; padding: 12px; color: var(--text); font-family: 'Inter', sans-serif;
  font-size: 13px; font-weight: 300; line-height: 1.65; resize: none;
}
textarea:focus { outline: none; border-color: var(--accent); }
textarea::placeholder { color: #3a3a3a; }

.styles { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; margin-bottom: 0; }
.style-opt { border: 0.5px solid var(--border2); border-radius: 8px; padding: 8px; cursor: pointer; transition: all .15s; }
.style-opt:hover { border-color: rgba(212,245,92,.4); }
.style-opt.active { border-color: var(--accent); background: rgba(212,245,92,.05); }
.style-prev { height: 34px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-family: 'Unbounded',sans-serif; font-size: 8px; font-weight: 700; margin-bottom: 5px; }
.style-name { font-size: 10px; color: var(--muted); text-align: center; }

.count-row { display: flex; align-items: center; gap: 8px; }
.count-btn { width: 26px; height: 26px; border: 0.5px solid var(--border2); background: var(--surface2); color: var(--text); border-radius: 6px; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.count-btn:hover { border-color: var(--accent); color: var(--accent); }
.count-num { font-family: 'Unbounded', sans-serif; font-size: 18px; font-weight: 700; padding: 0 10px; }

.gen-btn { width: 100%; padding: 13px; background: var(--accent); color: #111; font-family: 'Unbounded', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: .05em; border: none; border-radius: 8px; cursor: pointer; transition: all .2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
.gen-btn:hover:not(:disabled) { opacity: .87; transform: translateY(-1px); }
.gen-btn:disabled { opacity: .35; cursor: not-allowed; transform: none; }
.spin { width: 14px; height: 14px; border: 2px solid rgba(0,0,0,.2); border-top-color: #111; border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.error-msg { font-size: 12px; color: #ff7070; padding: 10px 12px; background: rgba(255,80,80,.08); border-radius: 6px; border: 0.5px solid rgba(255,80,80,.2); }

/* STATS */
.stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
.stat-card { background: var(--surface2); border-radius: 8px; padding: 12px; text-align: center; }
.stat-num { font-family: 'Unbounded', sans-serif; font-size: 22px; font-weight: 700; color: var(--text); }
.stat-label { font-size: 10px; color: var(--muted); margin-top: 3px; }

/* RIGHT PANEL */
.right { display: flex; flex-direction: column; overflow: hidden; }
.right-header { padding: 16px 24px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.right-title { font-family: 'Unbounded', sans-serif; font-size: 10px; font-weight: 700; color: var(--muted); }
.dl-btn { padding: 7px 16px; background: var(--surface2); border: 0.5px solid var(--border2); color: var(--text); font-size: 12px; border-radius: 7px; cursor: pointer; font-family: 'Inter', sans-serif; transition: all .15s; display: flex; align-items: center; gap: 6px; }
.dl-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
.dl-btn:disabled { opacity: .3; cursor: not-allowed; }

.content-area { flex: 1; overflow-y: auto; }

/* GENERATE TAB */
.slides-area { padding: 24px; display: flex; flex-direction: column; gap: 12px; }
.empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 24px; gap: 8px; color: var(--muted); text-align: center; }
.empty-state p { font-size: 13px; }
.empty-state p:last-child { font-size: 11px; opacity: .6; }

.progress-wrap { padding: 24px; display: flex; flex-direction: column; align-items: center; gap: 14px; }
.progress-bar-bg { width: 200px; height: 2px; background: var(--surface3); border-radius: 2px; overflow: hidden; }
.progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width .4s ease; }
.progress-text { font-size: 12px; color: var(--muted); }

/* SLIDE CARDS — preview */
.slide-wrap { display: flex; gap: 10px; align-items: flex-start; animation: fadeUp .3s ease both; }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.slide-meta { min-width: 22px; padding-top: 4px; }
.slide-meta-num { font-family: 'Unbounded', sans-serif; font-size: 9px; font-weight: 700; color: var(--muted); }
.slide-preview-card { flex: 1; max-width: 380px; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 16px rgba(0,0,0,.5); }

/* ACTUAL SLIDE RENDERERS */
.slide-render {
  width: 100%; aspect-ratio: 1/1; padding: 28px;
  display: flex; flex-direction: column; position: relative; overflow: hidden;
}
.slide-render::before {
  content: ''; position: absolute; inset: 0;
  background-image: linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
  background-size: 36px 36px;
}
.sr-inner { position: relative; z-index: 1; height: 100%; display: flex; flex-direction: column; }

/* Minimal */
.s-min { background: #f5f3ee; }
.s-min .sr-num { font-family:'Unbounded',sans-serif; font-size:9px; font-weight:700; color:#ccc; margin-bottom:auto; }
.s-min .sr-headline { font-family:'Unbounded',sans-serif; font-size:clamp(16px,4vw,22px); font-weight:900; color:#111; line-height:1.15; margin-bottom:10px; text-transform:uppercase; }
.s-min .sr-subhead { font-size:12px; font-weight:600; color:#333; margin-bottom:6px; }
.s-min .sr-body { font-size:12px; color:#777; line-height:1.6; font-weight:300; }
.s-min .sr-divider { width:32px; height:2px; background:#111; margin:12px 0; }

/* Dark */
.s-dark { background: #0d0d0d; }
.s-dark::before { background-image: linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px); }
.s-dark .sr-accent { position:absolute; top:0; right:0; width:4px; height:100%; background:#4a7fd4; z-index:2; }
.s-dark .sr-num { font-family:'Unbounded',sans-serif; font-size:9px; font-weight:700; color:#333; margin-bottom:auto; }
.s-dark .sr-headline { font-family:'Unbounded',sans-serif; font-size:clamp(16px,4vw,22px); font-weight:900; color:#fff; line-height:1.15; margin-bottom:10px; text-transform:uppercase; }
.s-dark .sr-subhead { font-size:12px; font-weight:600; color:#4a7fd4; margin-bottom:6px; }
.s-dark .sr-body { font-size:12px; color:#666; line-height:1.6; font-weight:300; }
.s-dark .sr-divider { width:32px; height:2px; background:#4a7fd4; margin:12px 0; }

/* Bold */
.s-bold .sr-num { font-family:'Unbounded',sans-serif; font-size:9px; font-weight:700; color:rgba(255,255,255,.25); margin-bottom:auto; }
.s-bold .sr-headline { font-family:'Unbounded',sans-serif; font-size:clamp(16px,4vw,22px); font-weight:900; color:#fff; line-height:1.15; margin-bottom:10px; text-transform:uppercase; }
.s-bold .sr-subhead { font-size:12px; font-weight:600; color:rgba(255,255,255,.7); margin-bottom:6px; }
.s-bold .sr-body { font-size:12px; color:rgba(255,255,255,.5); line-height:1.6; font-weight:300; }
.s-bold .sr-divider { width:32px; height:2px; background:rgba(255,255,255,.4); margin:12px 0; }

/* HISTORY TAB */
.history-area { padding: 24px; display: flex; flex-direction: column; gap: 10px; }
.history-card {
  background: var(--surface); border: 0.5px solid var(--border2); border-radius: 10px;
  padding: 14px 16px; cursor: pointer; transition: border-color .15s;
}
.history-card:hover { border-color: rgba(212,245,92,.3); }
.history-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.history-date { font-size: 11px; color: var(--muted); }
.history-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: var(--surface3); color: var(--muted); }
.history-text { font-size: 13px; color: var(--text); line-height: 1.4; opacity: .8; }
.history-empty { font-size: 13px; color: var(--muted); padding: 40px 0; text-align: center; }

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* Hidden render area for PNG export */
#render-area { position: fixed; left: -9999px; top: 0; display: flex; flex-direction: column; gap: 0; }
.export-slide { width: 1080px; height: 1080px; padding: 96px; display: flex; flex-direction: column; position: relative; overflow: hidden; }
.export-slide::before {
  content: ''; position: absolute; inset: 0;
  background-image: linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
  background-size: 64px 64px;
}
.es-inner { position: relative; z-index: 1; height: 100%; display: flex; flex-direction: column; }
.es-min { background: #f5f3ee; }
.es-dark { background: #0d0d0d; }
.es-dark::before { background-image: linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px); }
.es-num { font-family:'Unbounded',sans-serif; font-size:16px; font-weight:700; margin-bottom:auto; }
.es-min .es-num { color:#ddd; }
.es-dark .es-num, .es-bold .es-num { color:rgba(255,255,255,.2); }
.es-divider { width:56px; height:3px; margin:20px 0; }
.es-min .es-divider { background:#111; }
.es-dark .es-divider { background:#4a7fd4; }
.es-bold .es-divider { background:rgba(255,255,255,.4); }
.es-headline { font-family:'Unbounded',sans-serif; font-size:52px; font-weight:900; line-height:1.1; text-transform:uppercase; margin-bottom:18px; }
.es-min .es-headline { color:#111; }
.es-dark .es-headline, .es-bold .es-headline { color:#fff; }
.es-subhead { font-size:22px; font-weight:600; margin-bottom:12px; }
.es-min .es-subhead { color:#333; }
.es-dark .es-subhead { color:#4a7fd4; }
.es-bold .es-subhead { color:rgba(255,255,255,.75); }
.es-body { font-size:20px; line-height:1.65; font-weight:300; }
.es-min .es-body { color:#777; }
.es-dark .es-body { color:#666; }
.es-bold .es-body { color:rgba(255,255,255,.55); }
.es-dark-accent { position:absolute; top:0; right:0; width:8px; height:100%; background:#4a7fd4; z-index:2; }
</style>
</head>
<body>

<header class="header">
  <div class="logo"><div class="logo-dot"></div>Carousel AI</div>
  <nav class="nav">
    <button class="nav-btn active" onclick="switchTab('generate', this)">Генератор</button>
    <button class="nav-btn" onclick="switchTab('history', this)">История</button>
  </nav>
</header>

<div class="app">
  <!-- LEFT -->
  <div class="left">
    <div class="left-section">
      <div class="section-label">Текст</div>
      <textarea id="txt" placeholder="Вставьте любой текст — анонс, статья, описание функции..."></textarea>
    </div>

    <div class="left-section">
      <div class="section-label">Стиль</div>
      <div class="styles">
        <div class="style-opt active" data-style="minimal" onclick="setStyle(this)">
          <div class="style-prev" style="background:#f5f3ee;color:#111;font-family:'Unbounded',sans-serif;">Aa</div>
          <div class="style-name">Минимал</div>
        </div>
        <div class="style-opt" data-style="dark" onclick="setStyle(this)">
          <div class="style-prev" style="background:#0d0d0d;color:#4a7fd4;font-family:'Unbounded',sans-serif;">Aa</div>
          <div class="style-name">Тёмный</div>
        </div>
        <div class="style-opt" data-style="bold" onclick="setStyle(this)">
          <div class="style-prev" style="background:linear-gradient(135deg,#1a1a2e,#e94560);color:#fff;font-family:'Unbounded',sans-serif;">Aa</div>
          <div class="style-name">Яркий</div>
        </div>
      </div>
    </div>

    <div class="left-section">
      <div class="section-label">Количество слайдов</div>
      <div class="count-row">
        <button class="count-btn" onclick="chCnt(-1)">−</button>
        <div class="count-num" id="cnt-display">5</div>
        <button class="count-btn" onclick="chCnt(1)">+</button>
        <span style="font-size:12px;color:var(--muted);margin-left:4px">слайдов</span>
      </div>
    </div>

    <div class="left-section">
      <button class="gen-btn" id="gen-btn" onclick="generate()">
        <span id="gen-label">Сгенерировать</span>
      </button>
      <div id="gen-error" style="margin-top:10px;display:none" class="error-msg"></div>
    </div>

    <div class="left-section" id="stats-section">
      <div class="section-label">Статистика</div>
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-num" id="stat-total">—</div>
          <div class="stat-label">всего</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="stat-today">—</div>
          <div class="stat-label">сегодня</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="stat-week">—</div>
          <div class="stat-label">за неделю</div>
        </div>
      </div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="right-header">
      <div class="right-title" id="right-title">ПРЕДПРОСМОТР</div>
      <button class="dl-btn" id="dl-btn" onclick="downloadZip()" disabled>
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 3v13M7 11l5 5 5-5M4 20h16"/></svg>
        Скачать ZIP
      </button>
    </div>

    <div class="content-area" id="content-area">
      <!-- generate tab -->
      <div id="tab-generate">
        <div id="empty-state" class="empty-state">
          <p>Вставьте текст и нажмите «Сгенерировать»</p>
          <p>Генерация занимает ~3–5 секунд</p>
        </div>
        <div id="progress-state" class="progress-wrap" style="display:none">
          <div class="progress-bar-bg"><div class="progress-bar" id="progress-bar"></div></div>
          <div class="progress-text" id="progress-text">Генерирую...</div>
        </div>
        <div class="slides-area" id="slides-area" style="display:none"></div>
      </div>

      <!-- history tab -->
      <div id="tab-history" style="display:none">
        <div class="history-area" id="history-area">
          <div class="history-empty">Загружаю историю...</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Hidden export area -->
<div id="render-area"></div>

<script>
const BOLD_BGS = [
  'linear-gradient(135deg,#1a1a2e,#e94560)',
  'linear-gradient(135deg,#0f3460,#533483)',
  'linear-gradient(135deg,#1b1b2f,#e43f5a)',
  'linear-gradient(135deg,#16213e,#533483)',
  'linear-gradient(135deg,#2c003e,#e94560)',
  'linear-gradient(135deg,#0d0d0d,#1a472a)',
  'linear-gradient(135deg,#200122,#6f0000)',
  'linear-gradient(135deg,#1a1a2e,#c94b4b)',
];

// Session ID (простой, без авторизации)
const SESSION_ID = localStorage.getItem('session_id') || (() => {
  const id = 'sess_' + Math.random().toString(36).slice(2);
  localStorage.setItem('session_id', id);
  return id;
})();

let currentStyle = 'minimal';
let slideCount = 5;
let currentSlides = [];
let progressTimer;

function setStyle(el) {
  document.querySelectorAll('.style-opt').forEach(o => o.classList.remove('active'));
  el.classList.add('active');
  currentStyle = el.dataset.style;
  if (currentSlides.length) renderPreviews(currentSlides);
}

function chCnt(d) {
  slideCount = Math.max(3, Math.min(8, slideCount + d));
  document.getElementById('cnt-display').textContent = slideCount;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

function switchTab(tab, btn) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-generate').style.display = tab === 'generate' ? 'block' : 'none';
  document.getElementById('tab-history').style.display = tab === 'history' ? 'block' : 'none';
  document.getElementById('right-title').textContent = tab === 'generate' ? 'ПРЕДПРОСМОТР' : 'ИСТОРИЯ';
  document.getElementById('dl-btn').style.display = tab === 'generate' ? 'flex' : 'none';
  if (tab === 'history') loadHistory();
}

function setLoading(on) {
  const btn = document.getElementById('gen-btn');
  const label = document.getElementById('gen-label');
  btn.disabled = on;
  if (on) {
    btn.innerHTML = '<div class="spin"></div><span>Генерирую...</span>';
  } else {
    btn.innerHTML = '<span id="gen-label">Сгенерировать</span>';
  }
}

function startProgress() {
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('slides-area').style.display = 'none';
  document.getElementById('progress-state').style.display = 'flex';
  const bar = document.getElementById('progress-bar');
  const txt = document.getElementById('progress-text');
  const msgs = ['Анализирую текст...', 'Выделяю ключевые мысли...', 'Формирую слайды...', 'Почти готово...'];
  let p = 0, mi = 0;
  bar.style.width = '0%';
  progressTimer = setInterval(() => {
    p = Math.min(p + Math.random() * 6 + 2, 88);
    bar.style.width = p + '%';
    if (mi < msgs.length - 1 && p > (mi + 1) * 22) { mi++; txt.textContent = msgs[mi]; }
  }, 350);
}

function stopProgress() {
  clearInterval(progressTimer);
  document.getElementById('progress-bar').style.width = '100%';
  setTimeout(() => { document.getElementById('progress-state').style.display = 'none'; }, 300);
}

async function generate() {
  const text = document.getElementById('txt').value.trim();
  const errEl = document.getElementById('gen-error');
  errEl.style.display = 'none';

  if (text.length < 10) {
    errEl.textContent = 'Введите текст для генерации.';
    errEl.style.display = 'block';
    return;
  }

  setLoading(true);
  startProgress();

  try {
    const res = await fetch('/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, style: currentStyle, slideCount, sessionId: SESSION_ID })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Ошибка сервера');

    stopProgress();
    currentSlides = data.slides;
    renderPreviews(currentSlides);
    document.getElementById('dl-btn').disabled = false;
    loadStats();

  } catch (e) {
    stopProgress();
    document.getElementById('empty-state').style.display = 'flex';
    errEl.textContent = 'Ошибка: ' + e.message;
    errEl.style.display = 'block';
  } finally {
    setLoading(false);
  }
}

function renderPreviews(slides) {
  const area = document.getElementById('slides-area');
  area.innerHTML = '';
  area.style.display = 'flex';

  slides.forEach((s, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'slide-wrap';
    wrap.style.animationDelay = (i * 0.06) + 's';

    const meta = document.createElement('div');
    meta.className = 'slide-meta';
    meta.innerHTML = `<div class="slide-meta-num">0${i+1}</div>`;

    const card = document.createElement('div');
    card.className = 'slide-preview-card';
    card.innerHTML = buildPreviewHTML(s, i, currentStyle);

    wrap.appendChild(meta);
    wrap.appendChild(card);
    area.appendChild(wrap);
  });
}

function buildPreviewHTML(s, i, style) {
  const n = String(i+1).padStart(2,'0');
  // Первый и последний — только крупный заголовок
  const isHero = (i === 0 || i === currentSlides.length - 1);

  if (style === 'minimal') return `
    <div class="slide-render s-min">
      <div class="sr-inner">
        <div class="sr-num">${n} / 0${currentSlides.length}</div>
        <div class="sr-headline">${esc(s.headline)}</div>
        ${!isHero && s.subhead ? `<div class="sr-divider"></div><div class="sr-subhead">${esc(s.subhead)}</div>` : ''}
        ${s.body ? `<div class="sr-body">${esc(s.body)}</div>` : ''}
      </div>
    </div>`;

  if (style === 'dark') return `
    <div class="slide-render s-dark">
      <div class="sr-accent"></div>
      <div class="sr-inner">
        <div class="sr-num">${n} / 0${currentSlides.length}</div>
        <div class="sr-headline">${esc(s.headline)}</div>
        ${!isHero && s.subhead ? `<div class="sr-divider"></div><div class="sr-subhead">${esc(s.subhead)}</div>` : ''}
        ${s.body ? `<div class="sr-body">${esc(s.body)}</div>` : ''}
      </div>
    </div>`;

  const bg = BOLD_BGS[i % BOLD_BGS.length];
  return `
    <div class="slide-render s-bold" style="background:${bg}">
      <div class="sr-inner">
        <div class="sr-num">${n} / 0${currentSlides.length}</div>
        <div class="sr-headline">${esc(s.headline)}</div>
        ${!isHero && s.subhead ? `<div class="sr-divider"></div><div class="sr-subhead">${esc(s.subhead)}</div>` : ''}
        ${s.body ? `<div class="sr-body">${esc(s.body)}</div>` : ''}
      </div>
    </div>`;
}

async function downloadZip() {
  if (!currentSlides.length) return;
  const btn = document.getElementById('dl-btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spin" style="border-top-color:var(--accent)"></div> Рендерю...';

  // Строим слайды в скрытой области в 1080x1080
  const renderArea = document.getElementById('render-area');
  renderArea.innerHTML = '';

  currentSlides.forEach((s, i) => {
    const isHero = (i === 0 || i === currentSlides.length - 1);
    const n = String(i+1).padStart(2,'0');
    const div = document.createElement('div');
    div.className = `export-slide es-${currentStyle === 'minimal' ? 'min' : currentStyle === 'dark' ? 'dark' : 'bold'}`;
    if (currentStyle === 'bold') div.style.background = BOLD_BGS[i % BOLD_BGS.length];

    div.innerHTML = `
      ${currentStyle === 'dark' ? '<div class="es-dark-accent"></div>' : ''}
      <div class="es-inner">
        <div class="es-num">${n} / 0${currentSlides.length}</div>
        <div class="es-headline">${esc(s.headline)}</div>
        ${!isHero && s.subhead ? `<div class="es-divider"></div><div class="es-subhead">${esc(s.subhead)}</div>` : ''}
        ${s.body ? `<div class="es-body">${esc(s.body)}</div>` : ''}
      </div>`;
    renderArea.appendChild(div);
  });

  // Ждём рендер шрифтов
  await document.fonts.ready;
  await new Promise(r => setTimeout(r, 500));

  const zip = new JSZip();
  const exportEls = renderArea.querySelectorAll('.export-slide');

  for (let i = 0; i < exportEls.length; i++) {
    btn.innerHTML = `<div class="spin" style="border-top-color:var(--accent)"></div> ${i+1}/${exportEls.length}`;
    const canvas = await html2canvas(exportEls[i], {
      scale: 1,
      useCORS: true,
      backgroundColor: null,
      width: 1080,
      height: 1080,
      logging: false
    });
    const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
    zip.file(`slide-${String(i+1).padStart(2,'0')}.png`, blob);
  }

  const zipBlob = await zip.generateAsync({ type: 'blob' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(zipBlob);
  a.download = 'carousel.zip';
  a.click();

  renderArea.innerHTML = '';
  btn.disabled = false;
  btn.innerHTML = `<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 3v13M7 11l5 5 5-5M4 20h16"/></svg> Скачать ZIP`;
}

async function loadStats() {
  try {
    const res = await fetch('/stats');
    const data = await res.json();
    document.getElementById('stat-total').textContent = data.total;
    document.getElementById('stat-today').textContent = data.today;
    document.getElementById('stat-week').textContent = data.thisWeek;
  } catch {}
}

async function loadHistory() {
  const area = document.getElementById('history-area');
  try {
    const res = await fetch(`/history?sessionId=${SESSION_ID}`);
    const data = await res.json();
    if (!data.length) {
      area.innerHTML = '<div class="history-empty">История пуста — сгенерируйте первую карусель</div>';
      return;
    }
    area.innerHTML = '';
    data.forEach(item => {
      const card = document.createElement('div');
      card.className = 'history-card';
      const date = new Date(item.created_at).toLocaleDateString('ru', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
      card.innerHTML = `
        <div class="history-meta">
          <div class="history-date">${date}</div>
          <div class="history-badge">${item.slide_count} слайдов · ${item.style}</div>
        </div>
        <div class="history-text">${esc(item.input_text.slice(0, 120))}${item.input_text.length > 120 ? '...' : ''}</div>`;
      card.onclick = () => {
        currentSlides = item.slides;
        currentStyle = item.style;
        document.querySelectorAll('.style-opt').forEach(o => o.classList.toggle('active', o.dataset.style === item.style));
        switchTab('generate', document.querySelector('.nav-btn'));
        renderPreviews(currentSlides);
        document.getElementById('dl-btn').disabled = false;
      };
      area.appendChild(card);
    });
  } catch {
    area.innerHTML = '<div class="history-empty">Не удалось загрузить историю</div>';
  }
}

// Загружаем статистику при старте
loadStats();
document.addEventListener('keydown', e => { if ((e.ctrlKey||e.metaKey) && e.key==='Enter') generate(); });
</script>
