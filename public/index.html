<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carousel AI</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,700;1,700&family=Space+Grotesk:wght@400;600;700&family=Montserrat:wght@700;900&family=Raleway:wght@700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root {
  --bg:#0e0e0e;--surface:#161616;--surface2:#1e1e1e;--surface3:#252525;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#f0ede8;--muted:#666;--accent:#d4f55c;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-weight:300;min-height:100vh;display:flex;flex-direction:column;}

.header{padding:16px 28px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'Unbounded',sans-serif;font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px;}
.logo-dot{width:7px;height:7px;background:var(--accent);border-radius:50%;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.nav{display:flex;gap:4px;}
.nav-btn{padding:6px 14px;font-size:12px;border:0.5px solid transparent;border-radius:6px;cursor:pointer;background:transparent;color:var(--muted);font-family:'Inter',sans-serif;transition:all .15s;}
.nav-btn:hover{color:var(--text);}
.nav-btn.active{background:var(--surface2);border-color:var(--border2);color:var(--text);}

.app{display:grid;grid-template-columns:400px 1fr;flex:1;}
.left{border-right:0.5px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;}
.left-section{padding:20px 24px;border-bottom:0.5px solid var(--border);}
.section-label{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}

textarea{width:100%;height:150px;background:var(--surface2);border:0.5px solid var(--border2);border-radius:8px;padding:12px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;font-weight:300;line-height:1.65;resize:none;}
textarea:focus{outline:none;border-color:var(--accent);}
textarea::placeholder{color:#3a3a3a;}

/* Темы */
.themes{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.theme-opt{border:0.5px solid var(--border2);border-radius:10px;padding:0;cursor:pointer;transition:all .15s;overflow:hidden;}
.theme-opt:hover{border-color:rgba(212,245,92,.4);}
.theme-opt.active{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent);}
.theme-prev{height:64px;width:100%;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.theme-prev-text{font-size:11px;font-weight:700;text-align:center;padding:0 6px;line-height:1.2;position:relative;z-index:1;}
.theme-label{font-size:10px;color:var(--muted);text-align:center;padding:5px 0 6px;}

.count-row{display:flex;align-items:center;gap:8px;}
.count-btn{width:26px;height:26px;border:0.5px solid var(--border2);background:var(--surface2);color:var(--text);border-radius:6px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.count-btn:hover{border-color:var(--accent);color:var(--accent);}
.count-num{font-family:'Unbounded',sans-serif;font-size:18px;font-weight:700;padding:0 10px;}

.gen-btn{width:100%;padding:13px;background:var(--accent);color:#111;font-family:'Unbounded',sans-serif;font-size:11px;font-weight:700;letter-spacing:.05em;border:none;border-radius:8px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;}
.gen-btn:hover:not(:disabled){opacity:.87;transform:translateY(-1px);}
.gen-btn:disabled{opacity:.35;cursor:not-allowed;transform:none;}
.spin{width:14px;height:14px;border:2px solid rgba(0,0,0,.2);border-top-color:#111;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.error-msg{font-size:12px;color:#ff7070;padding:10px 12px;background:rgba(255,80,80,.08);border-radius:6px;border:0.5px solid rgba(255,80,80,.2);}

.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.stat-card{background:var(--surface2);border-radius:8px;padding:12px;text-align:center;}
.stat-num{font-family:'Unbounded',sans-serif;font-size:22px;font-weight:700;}
.stat-label{font-size:10px;color:var(--muted);margin-top:3px;}

.right{display:flex;flex-direction:column;overflow:hidden;}
.right-header{padding:16px 24px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.right-title{font-family:'Unbounded',sans-serif;font-size:10px;font-weight:700;color:var(--muted);}
.dl-btn{padding:7px 16px;background:var(--surface2);border:0.5px solid var(--border2);color:var(--text);font-size:12px;border-radius:7px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;display:flex;align-items:center;gap:6px;}
.dl-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}
.dl-btn:disabled{opacity:.3;cursor:not-allowed;}

.content-area{flex:1;overflow-y:auto;}
.slides-area{padding:24px;display:flex;flex-direction:column;gap:12px;}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;gap:8px;color:var(--muted);text-align:center;}
.empty-state p{font-size:13px;}
.empty-state p:last-child{font-size:11px;opacity:.6;}
.progress-wrap{padding:60px 24px;display:flex;flex-direction:column;align-items:center;gap:14px;}
.progress-bar-bg{width:200px;height:2px;background:var(--surface3);border-radius:2px;overflow:hidden;}
.progress-bar{height:100%;background:var(--accent);width:0%;transition:width .4s ease;}
.progress-text{font-size:12px;color:var(--muted);}

.slide-wrap{display:flex;gap:10px;align-items:flex-start;animation:fadeUp .3s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.slide-meta-num{font-family:'Unbounded',sans-serif;font-size:9px;font-weight:700;color:var(--muted);min-width:22px;padding-top:4px;}
.slide-preview-card{flex:1;max-width:380px;border-radius:10px;overflow:hidden;box-shadow:0 2px 16px rgba(0,0,0,.5);}

/* ---- СЛАЙД — базовый контейнер ---- */
.SLIDE{
  width:100%;aspect-ratio:1/1;
  display:flex;flex-direction:column;
  position:relative;overflow:hidden;
}

/* history */
.history-area{padding:24px;display:flex;flex-direction:column;gap:10px;}
.history-card{background:var(--surface);border:0.5px solid var(--border2);border-radius:10px;padding:14px 16px;cursor:pointer;transition:border-color .15s;}
.history-card:hover{border-color:rgba(212,245,92,.3);}
.history-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.history-date{font-size:11px;color:var(--muted);}
.history-badge{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--surface3);color:var(--muted);}
.history-text{font-size:13px;opacity:.8;line-height:1.4;}
.history-empty{font-size:13px;color:var(--muted);padding:40px 0;text-align:center;}

::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
#render-area{position:fixed;left:-9999px;top:0;pointer-events:none;}
</style>
</head>
<body>

<header class="header">
  <div class="logo"><div class="logo-dot"></div>Carousel AI</div>
  <nav class="nav">
    <button class="nav-btn active" onclick="switchTab('generate',this)">Генератор</button>
    <button class="nav-btn" onclick="switchTab('history',this)">История</button>
  </nav>
</header>

<div class="app">
  <div class="left">
    <div class="left-section">
      <div class="section-label">Текст</div>
      <textarea id="txt" placeholder="Вставьте любой текст — анонс, статья, описание функции..."></textarea>
    </div>

    <div class="left-section">
      <div class="section-label">Тема оформления</div>
      <div class="themes" id="themes-grid"></div>
    </div>

    <div class="left-section">
      <div class="section-label">Количество слайдов</div>
      <div class="count-row">
        <button class="count-btn" onclick="chCnt(-1)">−</button>
        <div class="count-num" id="cnt-display">5</div>
        <button class="count-btn" onclick="chCnt(1)">+</button>
        <span style="font-size:12px;color:var(--muted);margin-left:4px">слайдов</span>
      </div>
    </div>

    <div class="left-section">
      <button class="gen-btn" id="gen-btn" onclick="generate()">
        <span id="gen-label">Сгенерировать</span>
      </button>
      <div id="gen-error" style="margin-top:10px;display:none" class="error-msg"></div>
    </div>

    <div class="left-section">
      <div class="section-label">Статистика</div>
      <div class="stats-row">
        <div class="stat-card"><div class="stat-num" id="stat-total">—</div><div class="stat-label">всего</div></div>
        <div class="stat-card"><div class="stat-num" id="stat-today">—</div><div class="stat-label">сегодня</div></div>
        <div class="stat-card"><div class="stat-num" id="stat-week">—</div><div class="stat-label">за неделю</div></div>
      </div>
    </div>
  </div>

  <div class="right">
    <div class="right-header">
      <div class="right-title" id="right-title">ПРЕДПРОСМОТР</div>
      <button class="dl-btn" id="dl-btn" onclick="downloadZip()" disabled>
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 3v13M7 11l5 5 5-5M4 20h16"/></svg>
        Скачать ZIP
      </button>
    </div>
    <div class="content-area">
      <div id="tab-generate">
        <div id="empty-state" class="empty-state">
          <p>Выберите тему и нажмите «Сгенерировать»</p>
          <p>Каждая генерация уникальна</p>
        </div>
        <div id="progress-state" class="progress-wrap" style="display:none">
          <div class="progress-bar-bg"><div class="progress-bar" id="progress-bar"></div></div>
          <div class="progress-text" id="progress-text">Генерирую...</div>
        </div>
        <div class="slides-area" id="slides-area" style="display:none"></div>
      </div>
      <div id="tab-history" style="display:none">
        <div class="history-area" id="history-area"><div class="history-empty">Загружаю...</div></div>
      </div>
    </div>
  </div>
</div>

<div id="render-area"></div>

<script>
// ============================================================
// 6 ТЕМ — каждая со своей палитрой, шрифтом, характером
// ============================================================
const THEMES = {
  noir: {
    label: 'Noir',
    bg: '#0d0d0d', text: '#f0ede8', accent: '#d4f55c', muted: 'rgba(240,237,232,0.45)',
    font: "'Unbounded', sans-serif", bodyFont: "'Inter', sans-serif",
    grid: 'rgba(255,255,255,0.03)', accentBar: '#d4f55c',
    preview: { bg: '#0d0d0d', textColor: '#d4f55c', label: 'NOIR' }
  },
  slate: {
    label: 'Slate',
    bg: '#1a1f2e', text: '#e8eaf0', accent: '#5b8cff', muted: 'rgba(232,234,240,0.45)',
    font: "'Space Grotesk', sans-serif", bodyFont: "'Inter', sans-serif",
    grid: 'rgba(91,140,255,0.05)', accentBar: '#5b8cff',
    preview: { bg: '#1a1f2e', textColor: '#5b8cff', label: 'SLATE' }
  },
  cream: {
    label: 'Cream',
    bg: '#f5f0e8', text: '#1a1714', accent: '#c0392b', muted: 'rgba(26,23,20,0.45)',
    font: "'Playfair Display', serif", bodyFont: "'Inter', sans-serif",
    grid: 'rgba(0,0,0,0.04)', accentBar: '#c0392b',
    preview: { bg: '#f5f0e8', textColor: '#c0392b', label: 'Cream' }
  },
  forest: {
    label: 'Forest',
    bg: '#0f1f14', text: '#d4e8c2', accent: '#7bc67e', muted: 'rgba(212,232,194,0.45)',
    font: "'Montserrat', sans-serif", bodyFont: "'Inter', sans-serif",
    grid: 'rgba(123,198,126,0.04)', accentBar: '#7bc67e',
    preview: { bg: '#0f1f14', textColor: '#7bc67e', label: 'FOREST' }
  },
  rose: {
    label: 'Rose',
    bg: '#1f1015', text: '#f0dde4', accent: '#e87aa0', muted: 'rgba(240,221,228,0.45)',
    font: "'Raleway', sans-serif", bodyFont: "'Inter', sans-serif",
    grid: 'rgba(232,122,160,0.05)', accentBar: '#e87aa0',
    preview: { bg: '#1f1015', textColor: '#e87aa0', label: 'ROSE' }
  },
  paper: {
    label: 'Paper',
    bg: '#fafaf7', text: '#2c2c28', accent: '#2c2c28', muted: 'rgba(44,44,40,0.45)',
    font: "'Playfair Display', serif", bodyFont: "'Inter', sans-serif",
    grid: 'rgba(0,0,0,0.04)', accentBar: '#2c2c28',
    preview: { bg: '#fafaf7', textColor: '#2c2c28', label: 'Paper' }
  }
};

// ============================================================
// 5 LAYOUT-ОВ — случайно чередуются
// ============================================================
const LAYOUTS = ['hero', 'bigquote', 'split', 'list', 'centered'];

// Случайный layout для слайда, не повторяя предыдущий
function pickLayout(index, total, usedLayouts) {
  if (index === 0 || index === total - 1) return 'hero';
  const available = LAYOUTS.filter(l => l !== 'hero' && l !== usedLayouts[index - 1]);
  return available[Math.floor(Math.random() * available.length)];
}

// Генерируем план layouts один раз при рендере
function makeLayoutPlan(total) {
  const plan = [];
  for (let i = 0; i < total; i++) {
    plan.push(pickLayout(i, total, plan));
  }
  return plan;
}

// ============================================================
// РЕНДЕР СЛАЙДА
// ============================================================
function buildSlide(slide, index, total, themeKey, layout, scale = 1) {
  const t = THEMES[themeKey];
  const n = String(index + 1).padStart(2, '0');
  const tot = String(total).padStart(2, '0');

  // Базовый размер шрифта — всё масштабируется от него
  const base = 16 * scale;

  const h = esc(slide.headline || '');
  const s = esc(slide.subhead || '');
  const b = esc(slide.body || '');

  // Разбиваем body на пункты
  const rawItems = (slide.body || '')
    .split(/\n+/)
    .map(x => x.trim())
    .filter(x => x.length > 5)
    .slice(0, 4);
  const items = rawItems.length >= 2 ? rawItems : [slide.subhead, slide.body].filter(Boolean);

  const gridStyle = `background-image:linear-gradient(${t.grid} 1px,transparent 1px),linear-gradient(90deg,${t.grid} 1px,transparent 1px);background-size:${40*scale}px ${40*scale}px;`;
  const W = 380 * scale;
  const p = Math.round(38 * scale);

  const commonWrap = `
    position:relative;overflow:hidden;
    width:${W}px;height:${W}px;
    background:${t.bg};
    font-family:${t.bodyFont};
  `;

  const gridDiv = `<div style="position:absolute;inset:0;${gridStyle}opacity:1;pointer-events:none;"></div>`;
  const accentBar = `<div style="position:absolute;top:0;right:0;width:${4*scale}px;height:100%;background:${t.accentBar};z-index:2;"></div>`;
  const numDiv = `<div style="font-family:${t.font};font-size:${11*scale}px;font-weight:700;color:${t.muted};margin-bottom:auto;">${n} / ${tot}</div>`;

  if (layout === 'hero') {
    // Огромный заголовок + подпись внизу
    return `
    <div style="${commonWrap}">
      ${gridDiv}${accentBar}
      <div style="position:relative;z-index:1;height:100%;padding:${p}px;display:flex;flex-direction:column;">
        ${numDiv}
        <div style="font-family:${t.font};font-size:${clamp(b?36:44,28,52)*scale}px;font-weight:900;color:${t.text};line-height:1.05;text-transform:uppercase;flex:1;display:flex;align-items:center;word-break:break-word;">${h}</div>
        ${(s||b) ? `<div style="font-size:${14*scale}px;color:${t.muted};line-height:1.6;padding-top:${16*scale}px;border-top:1px solid ${t.muted.replace('0.45','0.15')};font-family:${t.bodyFont};font-weight:300;">${b||s}</div>` : ''}
      </div>
    </div>`;
  }

  if (layout === 'bigquote') {
    // Заголовок по центру на весь слайд
    return `
    <div style="${commonWrap}">
      ${gridDiv}${accentBar}
      <div style="position:relative;z-index:1;height:100%;padding:${p}px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:${20*scale}px;">
        <div style="position:absolute;top:${p}px;left:${p}px;font-family:${t.font};font-size:${11*scale}px;font-weight:700;color:${t.muted};">${n} / ${tot}</div>
        <div style="font-family:${t.font};font-size:${clamp(h.length>40?28:36,24,40)*scale}px;font-weight:900;color:${t.text};line-height:1.1;text-transform:uppercase;text-align:center;">${h}</div>
        ${(s||b) ? `<div style="font-size:${14*scale}px;color:${t.muted};line-height:1.65;text-align:center;max-width:${300*scale}px;font-family:${t.bodyFont};font-weight:300;">${s||b}</div>` : ''}
      </div>
    </div>`;
  }

  if (layout === 'split') {
    // Заголовок сверху, разделитель, текст крупно
    return `
    <div style="${commonWrap}">
      ${gridDiv}${accentBar}
      <div style="position:relative;z-index:1;height:100%;padding:${p}px;display:flex;flex-direction:column;">
        ${numDiv}
        <div style="font-family:${t.font};font-size:${clamp(h.length>35?26:32,22,36)*scale}px;font-weight:900;color:${t.text};line-height:1.1;text-transform:uppercase;margin-bottom:${20*scale}px;">${h}</div>
        <div style="width:${48*scale}px;height:${3*scale}px;background:${t.accent};border-radius:${2*scale}px;margin-bottom:${24*scale}px;"></div>
        ${s ? `<div style="font-size:${17*scale}px;font-weight:600;color:${t.text};margin-bottom:${10*scale}px;line-height:1.3;font-family:${t.bodyFont};">${s}</div>` : ''}
        ${b ? `<div style="font-size:${14*scale}px;color:${t.muted};line-height:1.7;font-family:${t.bodyFont};font-weight:300;flex:1;">${b}</div>` : ''}
      </div>
    </div>`;
  }

  if (layout === 'list') {
    // Нумерованные пункты
    const listHTML = items.map((item, i) => `
      <div style="display:flex;gap:${14*scale}px;align-items:flex-start;">
        <div style="font-family:${t.font};font-size:${22*scale}px;font-weight:900;color:${t.accent};line-height:1;min-width:${28*scale}px;">0${i+1}</div>
        <div style="font-size:${13*scale}px;color:${t.text};line-height:1.6;font-family:${t.bodyFont};font-weight:300;padding-top:${3*scale}px;">${esc(item)}</div>
      </div>`).join('');

    return `
    <div style="${commonWrap}">
      ${gridDiv}${accentBar}
      <div style="position:relative;z-index:1;height:100%;padding:${p}px;display:flex;flex-direction:column;">
        ${numDiv}
        <div style="font-family:${t.font};font-size:${clamp(h.length>30?24:30,20,34)*scale}px;font-weight:900;color:${t.text};line-height:1.1;text-transform:uppercase;margin-bottom:${24*scale}px;">${h}</div>
        <div style="display:flex;flex-direction:column;gap:${16*scale}px;flex:1;">${listHTML}</div>
      </div>
    </div>`;
  }

  if (layout === 'centered') {
    // Акцентный цвет фона для заголовка
    return `
    <div style="${commonWrap}">
      ${gridDiv}
      <div style="position:absolute;top:0;left:0;right:0;height:50%;background:${t.accent};opacity:0.08;"></div>
      ${accentBar}
      <div style="position:relative;z-index:1;height:100%;padding:${p}px;display:flex;flex-direction:column;">
        ${numDiv}
        <div style="flex:1;display:flex;flex-direction:column;justify-content:center;gap:${16*scale}px;">
          <div style="font-family:${t.font};font-size:${clamp(h.length>40?26:34,22,38)*scale}px;font-weight:900;color:${t.text};line-height:1.1;text-transform:uppercase;">${h}</div>
          <div style="width:${40*scale}px;height:${3*scale}px;background:${t.accent};border-radius:${2*scale}px;"></div>
          ${s ? `<div style="font-size:${16*scale}px;font-weight:600;color:${t.accent};font-family:${t.bodyFont};">${s}</div>` : ''}
          ${b ? `<div style="font-size:${14*scale}px;color:${t.muted};line-height:1.7;font-family:${t.bodyFont};font-weight:300;">${b}</div>` : ''}
        </div>
      </div>
    </div>`;
  }

  return '';
}

function clamp(val, min, max) { return Math.max(min, Math.min(max, val)); }
function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

// ============================================================
// UI
// ============================================================
const SESSION_ID = localStorage.getItem('sid') || (() => {
  const id = 'sess_' + Math.random().toString(36).slice(2);
  localStorage.setItem('sid', id); return id;
})();

let currentTheme = 'noir', slideCount = 5, currentSlides = [], currentLayouts = [], progressTimer;

// Рендер превью тем
function renderThemes() {
  const grid = document.getElementById('themes-grid');
  grid.innerHTML = '';
  Object.entries(THEMES).forEach(([key, t]) => {
    const el = document.createElement('div');
    el.className = 'theme-opt' + (key === currentTheme ? ' active' : '');
    el.onclick = () => {
      document.querySelectorAll('.theme-opt').forEach(o => o.classList.remove('active'));
      el.classList.add('active');
      currentTheme = key;
      if (currentSlides.length) renderPreviews(currentSlides);
    };
    el.innerHTML = `
      <div class="theme-prev" style="background:${t.preview.bg};">
        <div class="theme-prev-text" style="color:${t.preview.textColor};font-family:${t.font};font-size:13px;">${t.preview.label}</div>
      </div>
      <div class="theme-label">${t.label}</div>`;
    grid.appendChild(el);
  });
}

function chCnt(d) {
  slideCount = Math.max(3, Math.min(8, slideCount + d));
  document.getElementById('cnt-display').textContent = slideCount;
}

function switchTab(tab, btn) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-generate').style.display = tab === 'generate' ? 'block' : 'none';
  document.getElementById('tab-history').style.display = tab === 'history' ? 'block' : 'none';
  document.getElementById('right-title').textContent = tab === 'generate' ? 'ПРЕДПРОСМОТР' : 'ИСТОРИЯ';
  document.getElementById('dl-btn').style.display = tab === 'generate' ? 'flex' : 'none';
  if (tab === 'history') loadHistory();
}

function setLoading(on) {
  const btn = document.getElementById('gen-btn');
  btn.disabled = on;
  btn.innerHTML = on ? '<div class="spin"></div><span>Генерирую...</span>' : '<span>Сгенерировать</span>';
}

function startProgress() {
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('slides-area').style.display = 'none';
  document.getElementById('progress-state').style.display = 'flex';
  const bar = document.getElementById('progress-bar');
  const txt = document.getElementById('progress-text');
  const msgs = ['Анализирую текст...','Выделяю ключевые мысли...','Формирую слайды...','Почти готово...'];
  let p = 0, mi = 0; bar.style.width = '0%';
  progressTimer = setInterval(() => {
    p = Math.min(p + Math.random() * 6 + 2, 88);
    bar.style.width = p + '%';
    if (mi < msgs.length-1 && p > (mi+1)*22) { mi++; txt.textContent = msgs[mi]; }
  }, 350);
}

function stopProgress() {
  clearInterval(progressTimer);
  document.getElementById('progress-bar').style.width = '100%';
  setTimeout(() => { document.getElementById('progress-state').style.display = 'none'; }, 300);
}

async function generate() {
  const text = document.getElementById('txt').value.trim();
  const errEl = document.getElementById('gen-error');
  errEl.style.display = 'none';
  if (text.length < 10) { errEl.textContent = 'Введите текст.'; errEl.style.display = 'block'; return; }

  setLoading(true);
  startProgress();

  try {
    const res = await fetch('/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, style: currentTheme, slideCount, sessionId: SESSION_ID })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Ошибка сервера');

    stopProgress();
    currentSlides = data.slides;
    // Новый случайный план layout при каждой генерации
    currentLayouts = makeLayoutPlan(currentSlides.length);
    renderPreviews(currentSlides);
    document.getElementById('dl-btn').disabled = false;
    loadStats();
  } catch(e) {
    stopProgress();
    document.getElementById('empty-state').style.display = 'flex';
    errEl.textContent = 'Ошибка: ' + e.message;
    errEl.style.display = 'block';
  } finally { setLoading(false); }
}

function renderPreviews(slides) {
  const area = document.getElementById('slides-area');
  area.innerHTML = '';
  area.style.display = 'flex';
  // Новый план если смена темы
  if (!currentLayouts.length || currentLayouts.length !== slides.length) {
    currentLayouts = makeLayoutPlan(slides.length);
  }
  slides.forEach((s, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'slide-wrap';
    wrap.style.animationDelay = (i * 0.06) + 's';
    const meta = document.createElement('div');
    meta.className = 'slide-meta-num';
    meta.textContent = '0' + (i+1);
    const card = document.createElement('div');
    card.className = 'slide-preview-card';
    // scale=1 → 380px превью
    card.innerHTML = buildSlide(s, i, slides.length, currentTheme, currentLayouts[i], 1);
    wrap.appendChild(meta);
    wrap.appendChild(card);
    area.appendChild(wrap);
  });
}

async function downloadZip() {
  if (!currentSlides.length) return;
  const btn = document.getElementById('dl-btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spin" style="border-top-color:var(--accent)"></div> Рендерю...';

  const renderArea = document.getElementById('render-area');
  renderArea.innerHTML = '';

  // scale=2.842 → 380*2.842 ≈ 1080px
  const scale = 1080 / 380;

  currentSlides.forEach((s, i) => {
    const wrapper = document.createElement('div');
    wrapper.style.cssText = `width:1080px;height:1080px;overflow:hidden;`;
    wrapper.innerHTML = buildSlide(s, i, currentSlides.length, currentTheme, currentLayouts[i], scale);
    renderArea.appendChild(wrapper);
  });

  await document.fonts.ready;
  await new Promise(r => setTimeout(r, 800));

  const zip = new JSZip();
  for (let i = 0; i < renderArea.children.length; i++) {
    btn.innerHTML = `<div class="spin" style="border-top-color:var(--accent)"></div> ${i+1}/${renderArea.children.length}`;
    const canvas = await html2canvas(renderArea.children[i], {
      scale: 1, useCORS: true, backgroundColor: null,
      width: 1080, height: 1080, logging: false
    });
    const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
    zip.file(`slide-${String(i+1).padStart(2,'0')}.png`, blob);
  }

  const zipBlob = await zip.generateAsync({ type: 'blob' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(zipBlob);
  a.download = 'carousel.zip';
  a.click();

  renderArea.innerHTML = '';
  btn.disabled = false;
  btn.innerHTML = `<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 3v13M7 11l5 5 5-5M4 20h16"/></svg> Скачать ZIP`;
}

async function loadStats() {
  try {
    const r = await fetch('/stats');
    const d = await r.json();
    document.getElementById('stat-total').textContent = d.total;
    document.getElementById('stat-today').textContent = d.today;
    document.getElementById('stat-week').textContent = d.thisWeek;
  } catch {}
}

async function loadHistory() {
  const area = document.getElementById('history-area');
  try {
    const r = await fetch(`/history?sessionId=${SESSION_ID}`);
    const data = await r.json();
    if (!data.length) { area.innerHTML = '<div class="history-empty">История пуста</div>'; return; }
    area.innerHTML = '';
    data.forEach(item => {
      const card = document.createElement('div');
      card.className = 'history-card';
      const date = new Date(item.created_at).toLocaleDateString('ru', {day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
      card.innerHTML = `
        <div class="history-meta">
          <div class="history-date">${date}</div>
          <div class="history-badge">${item.slide_count} сл · ${item.style}</div>
        </div>
        <div class="history-text">${esc(item.input_text.slice(0,120))}${item.input_text.length>120?'...':''}</div>`;
      card.onclick = () => {
        currentSlides = item.slides;
        currentTheme = item.style;
        document.querySelectorAll('.theme-opt').forEach((o,idx) => {
          o.classList.toggle('active', Object.keys(THEMES)[idx] === item.style);
        });
        currentLayouts = makeLayoutPlan(currentSlides.length);
        switchTab('generate', document.querySelector('.nav-btn'));
        renderPreviews(currentSlides);
        document.getElementById('dl-btn').disabled = false;
      };
      area.appendChild(card);
    });
  } catch { area.innerHTML = '<div class="history-empty">Ошибка загрузки</div>'; }
}

renderThemes();
loadStats();
document.addEventListener('keydown', e => { if ((e.ctrlKey||e.metaKey) && e.key==='Enter') generate(); });
</script>
</body>
</html>
